services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.api
    image: physaio-ce-api
    container_name: physaio-ce-api
    ports:
      - "8153:8000"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - .env
    restart: always

  ui:
    build:
      context: .
      dockerfile: backend/Dockerfile.ui
    image: physaio-ce-ui
    container_name: physaio-ce-ui
    environment:
      - API_BASE=http://physaio-ce-api:8000
    depends_on:
      - api
    restart: always

  proxy:
    image: nginx:alpine
    container_name: physaio-ce-proxy
    ports:
      - "8292:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ui
    restart: always
